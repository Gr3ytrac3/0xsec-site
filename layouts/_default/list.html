{{- define "content" -}}
  {{- with .Title -}}
    <h2 class="text-base font-semibold text-gray-900 dark:text-white">
      {{- . -}}
    </h2>
  {{- end -}}
  <div class="text-sm text-gray-700 dark:text-gray-300">
    {{- .Content -}}
  </div>
  <section class="flex flex-col gap-4">
    {{- range .Pages -}}
      {{- partial "card.html" . -}}
    {{- end -}}
  </section>
{{- end -}}
