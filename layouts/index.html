{{- define "content" -}}
  {{- with .Title -}}
    <h2 class="text-base font-semibold text-gray-900 dark:text-white">
      {{- . -}}
    </h2>
  {{- end -}}
  <div class="prose dark:prose-invert prose-sm max-w-none mb-8">
    {{- .Content -}}
  </div>
  <a href="/blog" class="inline-flex items-center gap-2 font-mono text-sm text-amber-500 dark:text-amber-400 border border-amber-500 dark:border-amber-400 px-5 py-2.5 hover:bg-amber-500 hover:text-gray-900 dark:hover:bg-amber-400 dark:hover:text-gray-900 transition-colors">
    Read the Blog &rarr;
  </a>
{{- end -}}
